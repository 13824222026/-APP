image: ubuntu:22.04

variables:
  JAVA_HOME: "/usr/lib/jvm/java-17-openjdk-amd64"

before_script:
  - apt-get update -qq
  - apt-get install -y -qq python3 python3-pip git zip unzip openjdk-17-jdk autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev cmake libffi-dev libssl-dev wget curl
  - pip3 install --upgrade buildozer cython

stages:
  - build

build_apk:
  stage: build
  script:
    - buildozer android debug
  artifacts:
    paths:
      - bin/*.apk
